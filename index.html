<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>FitChrono - Cronómetro de Entrenamiento</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png">
</head>
<body>
    <div id="app">
        <!-- HOME SCREEN -->
        <div id="home" class="screen active">
            <header>
                <h1>FitChrono</h1>
                <button id="settings-btn" class="icon-btn">⚙️</button>
                <button id="theme-btn" class="icon-btn">🌙</button>
            </header>
            
            <div id="workout-selector" class="workout-grid">
                <button class="workout-card" data-type="emom">
                    <span class="emoji">⏱️</span>
                    <span class="name">EMOM</span>
                    <span class="desc">Cada Minuto</span>
                </button>
                <button class="workout-card" data-type="tabata">
                    <span class="emoji">🔥</span>
                    <span class="name">TABATA</span>
                    <span class="desc">20/10</span>
                </button>
                <button class="workout-card" data-type="amrap">
                    <span class="emoji">♾️</span>
                    <span class="name">AMRAP</span>
                    <span class="desc">Rounds en X min</span>
                </button>
                <button class="workout-card" data-type="fortime">
                    <span class="emoji">🏃</span>
                    <span class="name">FOR TIME</span>
                    <span class="desc">Time Cap</span>
                </button>
                <button class="workout-card" data-type="countdown">
                    <span class="emoji">⏮️</span>
                    <span class="name">COUNTDOWN</span>
                    <span class="desc">Cuenta Atras</span>
                </button>
                <button class="workout-card" data-type="interval">
                    <span class="emoji">🔄</span>
                    <span class="name">INTERVAL</span>
                    <span class="desc">Custom</span>
                </button>
            </div>

            <div id="config-section" class="config-hidden">
                <h2 id="config-title">Configura tu Workout</h2>
                <div id="config-fields"></div>
                <button id="start-btn" class="btn-primary">▶ INICIAR</button>
            </div>

            <div id="presets-section">
                <h3>⭐ Presets</h3>
                <div id="presets-list"></div>
            </div>
        </div>

        <!-- TIMER SCREEN -->
        <div id="timer-screen" class="screen">
            <header>
                <span id="workout-type-label">EMOM</span>
                <div>
                    <button id="mute-btn" class="icon-btn">🔊</button>
                    <button id="back-btn" class="icon-btn">⬅️</button>
                </div>
            </header>
            
            <div id="timer-display">
                <div id="time-main">00:00</div>
                <div id="time-rounds">Ronda 1/10</div>
                <div id="time-phase">PREPÁRATE</div>
            </div>

            <div id="timer-controls">
                <button id="pause-btn" class="btn-secondary">⏸ PAUSA</button>
                <button id="stop-btn" class="btn-danger">⏹ PARAR</button>
            </div>

            <div id="round-counter">
                <button id="round-btn" class="btn-round">+1 RONDA</button>
            </div>
        </div>

        <!-- SETTINGS OVERLAY -->
        <div id="settings-overlay" class="overlay">
            <div class="overlay-content">
                <h2>⚙️ Ajustes</h2>
                <div class="setting-row">
                    <span>Sonido</span>
                    <label class="toggle"><input type="checkbox" id="sound-toggle" checked><span class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <span>Vibración</span>
                    <label class="toggle"><input type="checkbox" id="vibration-toggle" checked><span class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <span>Tema oscuro</span>
                    <label class="toggle"><input type="checkbox" id="dark-toggle" checked><span class="slider"></span></label>
                </div>
                <button id="close-settings" class="btn-secondary">Cerrar</button>
            </div>
        </div>

        <!-- FINISHED OVERLAY -->
        <div id="finished-overlay" class="overlay">
            <div class="overlay-content finished">
                <h2>🏁 FINISHED!</h2>
                <div id="final-time">00:00</div>
                <div id="final-rounds"></div>
                <button id="done-btn" class="btn-primary">GUARDAR Y SALIR</button>
            </div>
        </div>
    </div>

    <script src="js/workouts.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
