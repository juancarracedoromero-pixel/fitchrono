<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chrono</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    .chrono-display {
      font-size: clamp(80px, 22vw, 140px);
      font-weight: 300;
      letter-spacing: -4px;
      color: #fff;
      line-height: 1;
      transition: color 0.2s;
    }

    .chrono-display.running { color: #00e676; }
    .chrono-display.paused { color: #ff9100; }

    .controls {
      display: flex;
      gap: 20px;
      margin-top: 60px;
    }

    .btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.94); }

    .btn-start {
      background: #00e676;
      color: #0a0a0a;
    }

    .btn-pause {
      background: #ff9100;
      color: #0a0a0a;
      display: none;
    }

    .btn-reset {
      background: #1a1a1a;
      color: #555;
      border: 1px solid #2a2a2a;
    }

    .btn-lap {
      background: #1a1a1a;
      color: #555;
      border: 1px solid #2a2a2a;
    }

    .running .btn-start { display: none; }
    .running .btn-pause { display: flex; }

    .laps {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #444;
      max-height: 120px;
      overflow-y: auto;
      padding: 0 20px;
    }

    .lap-time {
      display: block;
      margin: 5px 0;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: #00e676;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
    }

    .flash.on { opacity: 0.12; }

    .label {
      position: fixed;
      top: 40px;
      font-size: 10px;
      letter-spacing: 6px;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>
  <span class="label">chronometer</span>
  <div class="chrono-display" id="display">00:00.00</div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart">START</button>
    <button class="btn btn-pause" id="btnPause">PAUSE</button>
    <button class="btn btn-reset" id="btnReset">RESET</button>
    <button class="btn btn-lap" id="btnLap">LAP</button>
  </div>

  <div class="laps" id="laps"></div>

  <script>
    let startTime = 0, elapsed = 0, running = false, raf = null;

    const display = document.getElementById('display');
    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnReset = document.getElementById('btnReset');
    const btnLap = document.getElementById('btnLap');
    const laps = document.getElementById('laps');
    const flash = document.getElementById('flash');

    function format(ms) {
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const c = Math.floor((ms % 1000) / 10);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
    }

    function tick() {
      elapsed = Date.now() - startTime;
      display.textContent = format(elapsed);
      raf = requestAnimationFrame(tick);
    }

    function flashScreen() {
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 120);
    }

    btnStart.addEventListener('click', () => {
      running = true;
      startTime = Date.now() - elapsed;
      document.body.classList.add('running');
      display.classList.add('running');
      display.classList.remove('paused');
      tick();
      flashScreen();
    });

    btnPause.addEventListener('click', () => {
      running = false;
      cancelAnimationFrame(raf);
      document.body.classList.remove('running');
      display.classList.remove('running');
      display.classList.add('paused');
      flashScreen();
    });

    btnReset.addEventListener('click', () => {
      running = false;
      elapsed = 0;
      cancelAnimationFrame(raf);
      display.textContent = '00:00.00';
      document.body.classList.remove('running');
      display.classList.remove('running', 'paused');
      laps.innerHTML = '';
    });

    btnLap.addEventListener('click', () => {
      if (!running) return;
      const lap = document.createElement('span');
      lap.className = 'lap-time';
      lap.textContent = `#${laps.children.length + 1}  ${format(elapsed)}`;
      laps.prepend(lap);
    });
  </script>
</body>
</html>
